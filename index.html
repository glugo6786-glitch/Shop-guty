<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0066ff">
<link rel="manifest" href="manifest.json">
<title>Shop Guty</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f7fb;
}
header{
background:#0066ff;
color:white;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}
.hero{
padding:60px 20px;
text-align:center;
background:linear-gradient(135deg,#0066ff,#00b7ff);
color:white;
}
.hero h1{
font-size:42px;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}
.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}
.card img{
width:100%;
height:200px;
object-fit:cover;
}
.card-content{
padding:15px;
}
.price{
color:#0066ff;
font-size:24px;
font-weight:bold;
}
button{
width:100%;
padding:12px;
border:none;
background:#0066ff;
color:white;
font-weight:bold;
cursor:pointer;
}
footer{
background:#111827;
color:white;
text-align:center;
padding:20px;
}
</style>
</head>
<body>

<header>Shop Guty</header>

<section class="hero">
<h1>Marketplace de Productos Baratos</h1>
<p>Compra productos virales estilo Temu y Amazon.</p>
</section>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1200&auto=format&fit=crop">
<div class="card-content">
<h3>Smartphone</h3>
<div class="price">$2,999 MXN</div>
<button>Comprar</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1200&auto=format&fit=crop">
<div class="card-content">
<h3>Audífonos Bluetooth</h3>
<div class="price">$199 MXN</div>
<button>Comprar</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200&auto=format&fit=crop">
<div class="card-content">
<h3>Smartwatch</h3>
<div class="price">$299 MXN</div>
<button>Comprar</button>
</div>
</div>

</section>

<footer>
© 2026 Shop Guty
</footer>

<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
